name: Bug report
description: Report a problem with hosted Svg/icons MCP docs or setup guidance.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Client setup
        - Authentication
        - Tool reference
        - Prompt workflow
        - Example workflow
        - Use-case template
        - Validation
        - Other
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: ChatGPT, Codex, Cursor, Claude, VS Code, or other
  - type: dropdown
    id: setup_type
    attributes:
      label: Setup type
      options:
        - OAuth
        - Bearer token
        - Anonymous metadata-only access
        - Remote HTTP MCP
        - Local bridge
        - Not sure
  - type: dropdown
    id: tool
    attributes:
      label: Tool affected
      options:
        - Not tool-specific
        - search_icons
        - search_icon_sets
        - get_icon
        - export_icon_png
        - recommend_icons_for_ui
        - create_icon_kit
        - generate_icon_kit_for_project
        - export_icon_collection
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or errors
      description: Remove tokens, cookies, authorization headers, and private paths before sharing.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I confirm this report does not include real tokens, private credentials, or private data.
          required: true
